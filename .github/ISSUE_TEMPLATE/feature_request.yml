name: Feature Request
description: Propose an improvement aligned with daemon-first, local-first Matryca Plumber
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        **Matryca Plumber** is a **standalone**, **local-first** background AI **daemon** and **mutation plane** for your Logseq graph — **database-free** and **Logseq OG–native**.
        Features that require auxiliary databases, a hosted system of record, cloud sync as a hard dependency, or unstructured page blobs are usually out of scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What pain point or gap does this address? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Concrete behavior — tools, daemon modules, docs, or UI changes.
    validations:
      required: true

  - type: textarea
    id: paradigm_alignment
    attributes:
      label: How does this align with local-first, zero-auxiliary-db philosophy?
      description: Explain why the feature keeps data on disk / in Logseq and avoids SQLite, Postgres, Redis, or other central stores.
    validations:
      required: true

  - type: checkboxes
    id: paradigm_checks
    attributes:
      label: Paradigm checklist
      options:
        - label: No auxiliary databases — graph content stays Logseq Markdown on disk; no new system-of-record store (SQLite, Postgres, Redis, etc.)
          required: true
        - label: Block-shaped thinking — respects the outliner model (blocks, nesting, `id::`) rather than flat document blobs
          required: true
        - label: Strict OCC — Phase-1 snapshot + Phase-2 mtime verification for any new mutator
          required: true
        - label: Respects AST parity (frontmatter, multiline padding, CRLF-safe I/O) for any graph write
          required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you evaluate, and why is your proposal better?
    validations:
      required: false

  - type: checkboxes
    id: local_checks
    attributes:
      label: Local validation
      options:
        - label: I ran `make check` on a prototype branch (if applicable)
          required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Example Markdown, mock tool schemas, or links to Logseq docs.
    validations:
      required: false
